name: 🌐 Universal Downloader (by GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '🔗 Direct File Link (Anime, Video, etc.)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download File
        run: |
          mkdir -p downloads
          LINK="${{ github.event.inputs.download_url }}"
          FILENAME=$(basename "$LINK")
          curl -L --retry 5 --retry-delay 10 \
               -H "User-Agent: Mozilla/5.0" \
               -o "downloads/$FILENAME" "$LINK"
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      - name: 📤 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add downloads/
          git commit -m "📦 Add ${{ env.FILE_NAME }}" || echo "No changes to commit"
          git push
