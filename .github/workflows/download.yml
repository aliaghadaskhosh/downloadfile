name: 📥 Download to Repository

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک فایل'
        required: true
        type: string

jobs:
  save_file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 دریافت کدها
        uses: actions/checkout@v4

      - name: ⬇️ دانلود فایل
        run: |
          mkdir -p downloads
          curl -L -o "downloads/$(basename "${{ github.event.inputs.file_url }}")" \
               "${{ github.event.inputs.file_url }}"

      - name: 📤 ذخیره در گیت
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add downloads/
          git commit -m "فایل جدید اضافه شد" || echo "تغییری برای ذخیره وجود ندارد"
          git push
