name: 🌐 Download to Artifact

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '🔗 لینک فایل'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ دانلود فایل
        run: |
          mkdir -p downloads
          curl -L -H "User-Agent: Mozilla/5.0" \
               -H "Referer: https://tools.irbots.com/" \
               -o "downloads/$(basename "${{ github.event.inputs.download_url }}")" \
               "${{ github.event.inputs.download_url }}"

      - name: 📦 آپلود به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: فایل-دانلودی
          path: downloads/
          retention-days: 7
